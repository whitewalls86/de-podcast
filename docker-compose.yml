services:

  pipeline:
    profiles: [pipeline]
    build: ./pipeline
    ports:
      - "8001:8001"
      - "6080:6080"
    volumes:
      - episodes:/app/episodes
      - pipeline_data:/app/data
      - notebooklm_auth:/root/.notebooklm
      - ./config/sources.json:/app/sources.json
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FEED_TOKEN=${FEED_TOKEN}
      - FEED_URL=http://feed:8000
      - FEED_HOST=http://${HOST_LAN_IP}:8000
    depends_on:
      - feed

  feed:
    build: ./feed
    ports:
      - "8000:8000"
    volumes:
      - episodes:/app/episodes
    environment:
      - FEED_TOKEN=${FEED_TOKEN}
      - FEED_TITLE=${FEED_TITLE:-DE Daily}
      - FEED_HOST=http://${HOST_LAN_IP}:8000
      - PIPELINE_HOST=http://${HOST_LAN_IP}:8001

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}

volumes:
  episodes:
  pipeline_data:
  notebooklm_auth:
  n8n_data:
